metadata:
  name: aceest-version-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      track: version-b
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: version-b
    spec:
      containers:
      - name: aceest
        image: sarikaupadhyay/aceest-fitness:v3.2
        ports:
        - containerPort: 5000
