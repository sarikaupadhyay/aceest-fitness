name: ACEest Fitness CI/CD Pipeline

# Trigger on every push and pull request to main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ────────────────────────────────────────────
  # JOB 1: Build & Lint
  # ────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint - check syntax with py_compile
        run: |
          python -m py_compile app.py
          echo "Syntax check passed"

      - name: Lint - check for critical errors only
        run: |
          pip install flake8
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=200

  # ────────────────────────────────────────────
  # JOB 2: Docker Image Build
  # ────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:latest .
          echo "Docker image built successfully"

      - name: Verify Docker image exists
        run: docker images aceest-fitness

  # ────────────────────────────────────────────
  # JOB 3: Automated Testing inside Docker
  # ────────────────────────────────────────────
  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside Docker container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            aceest-fitness:test \
            pytest test_app.py -v --tb=short

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "*.log"
